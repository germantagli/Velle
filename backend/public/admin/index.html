<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin KYC - Velle</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #1a1a2e; }
    .login-box { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; }
    .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #0066CC; color: #fff; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .user-card { background: #fff; padding: 16px; margin: 12px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .user-info { flex: 1; }
    .user-info strong { display: block; font-size: 16px; color: #1a1a2e; }
    .user-info span { color: #666; font-size: 14px; }
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }
    .doc-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .doc-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .doc-card .label { padding: 12px; font-weight: 600; color: #333; }
    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin: 12px 0; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .logout { color: #666; cursor: pointer; font-size: 14px; }
    .logout:hover { color: #0066CC; }
    .empty { text-align: center; padding: 48px; color: #666; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="loginView" class="login-box" style="display:none">
      <h2>Iniciar sesión (Admin)</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Contraseña">
      <button class="btn btn-primary" onclick="login()" style="width:100%;margin-top:8px">Entrar</button>
      <div id="loginError" class="error" style="display:none;margin-top:12px"></div>
    </div>

    <div id="mainView" style="display:none">
      <div class="header">
        <h1>Revisión KYC</h1>
        <a class="logout" onclick="logout()">Cerrar sesión</a>
      </div>

      <div id="pendingList"></div>
      <div id="userDetail" style="display:none">
        <button class="btn btn-secondary" onclick="showList()">← Volver</button>
        <div id="userInfo" style="margin:16px 0"></div>
        <div id="rejectReason" style="display:none;margin:16px 0">
          <label>Motivo del rechazo (opcional)</label>
          <input type="text" id="rejectReasonInput" placeholder="Ej: Documento ilegible">
        </div>
        <div class="doc-grid" id="docGrid"></div>
        <div class="actions">
          <button class="btn btn-success" onclick="approve()">✓ Aprobar</button>
          <button class="btn btn-danger" onclick="showRejectReason()">✗ Rechazar</button>
          <button class="btn btn-danger" id="confirmRejectBtn" style="display:none" onclick="reject()">Confirmar rechazo</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('adminToken');

    function headers() {
      const h = { 'Content-Type': 'application/json' };
      if (token) h['Authorization'] = 'Bearer ' + token;
      return h;
    }

    function showView() {
      if (token) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
        loadPending();
      } else {
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('mainView').style.display = 'none';
      }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      if (!email || !pass) {
        errEl.textContent = 'Email y contraseña requeridos';
        errEl.style.display = 'block';
        return;
      }
      try {
        const r = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          errEl.textContent = data.message || 'Error al iniciar sesión';
          errEl.style.display = 'block';
          return;
        }
        token = data.access_token;
        localStorage.setItem('adminToken', token);
        errEl.style.display = 'none';
        showView();
      } catch (e) {
        errEl.textContent = 'Error de conexión: ' + e.message;
        errEl.style.display = 'block';
      }
    }

    function logout() {
      token = null;
      localStorage.removeItem('adminToken');
      showView();
    }

    async function loadPending() {
      const el = document.getElementById('pendingList');
      el.innerHTML = '<p>Cargando...</p>';
      try {
        const r = await fetch(API + '/admin/kyc/pending', { headers: headers() });
        if (r.status === 403) {
          logout();
          return;
        }
        const data = await r.json();
        if (data.users && data.users.length === 0) {
          el.innerHTML = '<div class="empty">No hay solicitudes KYC pendientes.</div>';
          return;
        }
        el.innerHTML = data.users.map(u => `
          <div class="user-card">
            <div class="user-info">
              <strong>${u.firstName} ${u.lastName}</strong>
              <span>${u.email}</span>
              <span>${u.documentCount} documento(s) · ${new Date(u.createdAt).toLocaleDateString()}</span>
            </div>
            <button class="btn btn-primary" onclick="loadUser('${u.id}')">Revisar</button>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
      }
    }

    let currentUserId = null;

    async function loadUser(userId) {
      currentUserId = userId;
      document.getElementById('pendingList').style.display = 'none';
      document.getElementById('userDetail').style.display = 'block';
      document.getElementById('rejectReason').style.display = 'none';
      document.getElementById('confirmRejectBtn').style.display = 'none';

      const infoEl = document.getElementById('userInfo');
      const gridEl = document.getElementById('docGrid');
      infoEl.innerHTML = 'Cargando...';
      gridEl.innerHTML = '';

      try {
        const r = await fetch(API + '/admin/kyc/users/' + userId + '/documents', { headers: headers() });
        const data = await r.json();
        infoEl.innerHTML = `<strong>${data.user.firstName} ${data.user.lastName}</strong> · ${data.user.email}`;
        gridEl.innerHTML = data.documents.map(d => `
          <div class="doc-card">
            <img src="${d.viewUrl}" alt="${d.label}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23eee%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22>No se pudo cargar</text></svg>'">
            <div class="label">${d.label}</div>
          </div>
        `).join('');
      } catch (e) {
        infoEl.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
      }
    }

    function showList() {
      document.getElementById('pendingList').style.display = 'block';
      document.getElementById('userDetail').style.display = 'none';
      loadPending();
    }

    function showRejectReason() {
      document.getElementById('rejectReason').style.display = 'block';
      document.getElementById('confirmRejectBtn').style.display = 'inline-block';
    }

    async function approve() {
      if (!currentUserId) return;
      try {
        const r = await fetch(API + '/admin/kyc/users/' + currentUserId + '/approve', {
          method: 'POST',
          headers: headers(),
        });
        if (!r.ok) throw new Error((await r.json()).message || 'Error');
        alert('KYC aprobado');
        showList();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function reject() {
      if (!currentUserId) return;
      const reason = document.getElementById('rejectReasonInput').value.trim() || undefined;
      try {
        const r = await fetch(API + '/admin/kyc/users/' + currentUserId + '/reject', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ reason }),
        });
        if (!r.ok) throw new Error((await r.json()).message || 'Error');
        alert('KYC rechazado');
        showList();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    showView();
  </script>
</body>
</html>
